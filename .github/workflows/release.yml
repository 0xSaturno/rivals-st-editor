name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - "**[0-9]+.[0-9]+.[0-9]+*"

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # ── .NET SDK (covers both net8.0 for UAssetTool and net9.0 for LocresReader) ──
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.x"

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.x"

      # ── Build UAssetTool ──
      - name: Build UAssetTool
        run: |
          dotnet publish UassetToolRivals/src/UAssetTool/UAssetTool.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -o UassetToolRivals/src/UAssetTool/bin/Release/net8.0/win-x64/publish

      # ── Build LocresReader ──
      - name: Build LocresReader
        run: |
          dotnet publish LocresReader/MarvelRivalsLocresReader.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -o LocresReader/publish_single

      - name: Download oo2core DLL
        shell: pwsh
        run: |
          $url  = "https://github.com/new-world-tools/go-oodle/releases/download/v0.2.3-files/oo2core_9_win64.dll"
          $dest = "LocresReader/publish_single/oo2core_9_win64.dll"
          Write-Host "Downloading Oodle DLL from $url"
          Invoke-WebRequest -Uri $url -OutFile $dest -UseBasicParsing
          if (Test-Path $dest) {
            Write-Host "oo2core_9_win64.dll downloaded successfully"
          } else {
            Write-Error "Failed to download oo2core_9_win64.dll"
            exit 1
          }

      # ── Rust toolchain ──
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."

      # ── Tauri build ──
      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build Tauri app
        run: cargo tauri build --no-bundle

      # ── Package portable zip ──
      - name: Create portable zip
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          $zipName = "rivals-st-editor-${version}-x86_64-pc-windows-msvc.zip"
          $stagingDir = "staging"

          New-Item -ItemType Directory -Path $stagingDir -Force | Out-Null
          New-Item -ItemType Directory -Path "$stagingDir/tools" -Force | Out-Null

          # Copy exe (frontend assets are embedded inside via Tauri's frontendDist)
          Copy-Item "target/release/rivals-st-editor.exe" -Destination $stagingDir

          # Copy external tools (spawned as separate processes at runtime)
          Copy-Item "UassetToolRivals/src/UAssetTool/bin/Release/net8.0/win-x64/publish/UAssetTool.exe" -Destination "$stagingDir/tools/"
          Copy-Item "LocresReader/publish_single/MarvelRivalsLocresReader.exe" -Destination "$stagingDir/tools/"
          $dll = "LocresReader/publish_single/oo2core_9_win64.dll"
          if (Test-Path $dll) {
            Copy-Item $dll -Destination "$stagingDir/tools/"
          }

          # Include documentation
          Copy-Item "CLI_USAGE.md" -Destination $stagingDir -ErrorAction SilentlyContinue
          Copy-Item "README.md"    -Destination $stagingDir -ErrorAction SilentlyContinue
          Copy-Item "LICENSE"      -Destination $stagingDir -ErrorAction SilentlyContinue

          # Create zip
          Compress-Archive -Path "$stagingDir/*" -DestinationPath $zipName -Force
          Write-Host "Created: $zipName"

      # ── GitHub Release ──
      - name: Create GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          tag="${GITHUB_REF_NAME}"

          zip="rivals-st-editor-${version}-x86_64-pc-windows-msvc.zip"

          gh release create "$tag" \
            --title "Rivals ST Editor v${version}" \
            --generate-notes \
            "$zip"
